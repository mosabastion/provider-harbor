apiVersion: project.harbor.m.crossplane.io/v1beta1
kind: Project
metadata:
  name: uptest-groupmember-proj
  namespace: uptest
  annotations:
    meta.upbound.io/example-id: harbor/v1beta1/groupmember
spec:
  forProvider:
    name: uptest-groupmember-proj
    public: false
  providerConfigRef:
    kind: ProviderConfig
    name: harbor-e2e
---
apiVersion: member.harbor.m.crossplane.io/v1beta1
kind: GroupMember
metadata:
  name: uptest-groupmember
  namespace: uptest
  annotations:
    meta.upbound.io/example-id: harbor/v1beta1/groupmember
spec:
  forProvider:
    projectId: uptest-groupmember-proj
    groupName: uptest-group
    # groupType defaults to 3 (OIDC); set 1 for LDAP or 2 for HTTP.
    groupType: 3
    role: guest
  providerConfigRef:
    kind: ProviderConfig
    name: harbor-e2e
